name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v0.1.0). Leave empty to auto-compute from commits since the last tag.'
        required: false
        type: string

jobs:
  build-dmg:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      # actions/checkout v6.0.2 — fetch full history + tags so the bump action can see them.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Install XcodeGen + create-dmg
        run: brew install xcodegen create-dmg

      # mathieudutour/github-tag-action v6.2 — reads conventional commits
      # since the last tag and emits the next vX.Y.Z. Runs in dry-run so
      # the tag is created later by `gh release create`.
      #
      # Upstream is dormant and still declares `runs: using: "node20"`.
      # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 opts this step into Node 24 ahead
      # of GitHub's 2026-06-02 forced migration so we validate compatibility
      # under our control. Can be removed once upstream ships a Node 24
      # release, or after 2026-09-16 when Node 20 is removed and Node 24
      # becomes the default. See https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
      - name: Compute next version
        id: bump
        if: ${{ inputs.version == '' }}
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          dry_run: true

      - name: Resolve release tag
        id: tag
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${{ steps.bump.outputs.new_tag }}"
          fi
          echo "Resolved release tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Prepare release metadata
        run: |
          MARKETING_VERSION="${{ steps.tag.outputs.tag }}"
          MARKETING_VERSION="${MARKETING_VERSION#v}"
          echo "MARKETING_VERSION=$MARKETING_VERSION" >> "$GITHUB_ENV"
          echo "CURRENT_PROJECT_VERSION=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${{ steps.tag.outputs.tag }}" >> "$GITHUB_ENV"

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release)
        run: |
          set -o pipefail
          xcodebuild \
            -project AgendumNeo.xcodeproj \
            -scheme AgendumNeo \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$CURRENT_PROJECT_VERSION" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Stage app for DMG
        run: |
          mkdir -p dmg-staging
          cp -R "build/Build/Products/Release/Agendum Neo.app" dmg-staging/

      - name: Create DMG
        run: |
          DMG_NAME="AgendumNeo-${RELEASE_TAG}.dmg"
          create-dmg \
            --volname "Agendum Neo ${RELEASE_TAG}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Agendum Neo.app" 175 190 \
            --hide-extension "Agendum Neo.app" \
            --app-drop-link 425 190 \
            --no-internet-enable \
            "$DMG_NAME" \
            dmg-staging/
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$RELEASE_TAG" \
            "$DMG_NAME" \
            --title "$RELEASE_TAG" \
            --generate-notes
